<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IES Gregorio Prieto - Gestión Digital</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* ── LOGIN SCREEN ─────────────────────────────────────────── */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #54993e 0%, #3a6b1a 100%);
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 350px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }

        .login-box h1 {
            color: #3a6b1a;
            margin-bottom: 10px;
            font-size: 24px;
            text-align: center;
        }

        .login-box p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #3a6b1a;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #54993e;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #54993e;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-login:hover {
            background-color: #3a6b1a;
        }

        .btn-login:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .error-message {
            color: #d32f2f;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: #54993e;
            font-weight: 600;
            margin-top: 15px;
        }

        /* ── ROLE SELECTOR MODAL ──────────────────────────────────── */
        .role-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .role-modal.active {
            display: flex;
        }

        .role-modal-content {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            text-align: center;
        }

        .role-modal-content h2 {
            color: #3a6b1a;
            margin-bottom: 10px;
            font-size: 20px;
        }

        .role-modal-content p {
            color: #666;
            margin-bottom: 30px;
        }

        .role-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .role-btn {
            padding: 15px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 600;
            text-align: left;
        }

        .role-btn:hover {
            border-color: #54993e;
            background-color: #f9f9f9;
        }

        .role-btn.selected {
            border-color: #54993e;
            background-color: #e8f5e9;
            color: #3a6b1a;
        }

        .role-btn-icon {
            font-size: 20px;
            margin-right: 10px;
        }

        .btn-confirm {
            width: 100%;
            padding: 12px;
            background-color: #54993e;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-confirm:hover {
            background-color: #3a6b1a;
        }

        /* ── APP LAYOUT ───────────────────────────────────────────── */
        .app-container {
            display: none;
            min-height: 100vh;
            background-color: #f5f5f5;
            flex-direction: column;
        }

        .app-container.active {
            display: flex;
        }

        header {
            background-color: white;
            border-bottom: 3px solid #54993e;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .header-logo {
            width: 50px;
            height: 50px;
        }

        .header-title {
            flex: 1;
            margin-left: 15px;
        }

        .header-title h1 {
            color: #3a6b1a;
            font-size: 20px;
            margin: 0;
        }

        .header-title p {
            color: #666;
            font-size: 12px;
            margin: 3px 0 0 0;
        }

        .header-user {
            text-align: right;
        }

        .header-user p {
            margin: 0;
            color: #333;
            font-size: 13px;
            font-weight: 600;
        }

        .role-badge {
            background-color: #54993e;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 11px;
            display: inline-block;
            margin-top: 3px;
        }

        .btn-logout {
            background: none;
            border: none;
            color: #54993e;
            cursor: pointer;
            font-weight: 600;
            padding: 0;
            margin-top: 5px;
            font-size: 12px;
        }

        .btn-logout:hover {
            text-decoration: underline;
        }

        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .module-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .module-btn {
            padding: 20px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
        }

        .module-btn:hover {
            border-color: #54993e;
            box-shadow: 0 3px 10px rgba(84, 153, 62, 0.2);
        }

        .module-btn span {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
        }

        .form-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .form-section h2 {
            color: #3a6b1a;
            margin-bottom: 15px;
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .login-box {
                max-width: 90%;
            }

            .role-modal-content {
                max-width: 90%;
            }

            header {
                flex-wrap: wrap;
            }

            .header-title {
                flex: 1;
            }

            .module-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="login-container" style="display:flex;">
        <div class="login-box">
            <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#54993e" stroke="#3a6b1a" stroke-width="2"/>
                <text x="50" y="60" font-size="40" font-weight="bold" fill="white" text-anchor="middle">P</text>
            </svg>
            <h1>IES Gregorio Prieto</h1>
            <p>Gestión Digital</p>
            
            <div id="errorMessage" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="tu.email@somosdelprieto.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-login">Acceder</button>
                <div class="loading" id="loadingMessage" style="display:none;">⏳ Validando...</div>
            </form>
        </div>
    </div>

    <!-- ROLE SELECTOR MODAL -->
    <div id="roleModal" class="role-modal">
        <div class="role-modal-content">
            <h2>Elige tu rol 👤</h2>
            <p id="roleMessage">¿Con qué rol deseas entrar?</p>
            <div class="role-options" id="roleOptions"></div>
            <button type="button" class="btn-confirm" id="confirmRoleBtn">Acceder</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appContainer" class="app-container">
        <header>
            <svg class="header-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#54993e" stroke="#3a6b1a" stroke-width="2"/>
                <text x="50" y="60" font-size="40" font-weight="bold" fill="white" text-anchor="middle">P</text>
            </svg>
            <div class="header-title">
                <h1>IES Gregorio Prieto</h1>
                <p>Carrocería - Ciclos Formativos</p>
            </div>
            <div class="header-user">
                <p id="userDisplay">Usuario</p>
                <div id="roleDisplay"></div>
                <button type="button" class="btn-logout" id="logoutBtn">Salir</button>
            </div>
        </header>

        <div class="content">
            <div class="module-selector">
                <button type="button" class="module-btn" id="mantenimientoBtn">
                    <span>🔧</span>
                    Mantenimiento
                </button>
                <button type="button" class="module-btn" id="dldBtn">
                    <span>📅</span>
                    Días Libres
                </button>
                <button type="button" class="module-btn" id="guardiasBtn" style="display:none;">
                    <span>👁️</span>
                    Guardias
                </button>
                <button type="button" class="module-btn" id="adminBtn" style="display:none;">
                    <span>🔐</span>
                    Admin
                </button>
            </div>

            <div class="form-section">
                <h2>Bienvenido a Gestión Digital</h2>
                <p>Selecciona un módulo arriba para comenzar.</p>
            </div>
        </div>
    </div>

    <script>
        // ── CONFIGURACIÓN ────────────────────────────────────────────
        const msalConfig = {
            auth: {
                clientId: 'e5034649-9f51-4a15-9684-931f479bf618',
                authority: 'https://login.microsoftonline.com/052132ea-1ae4-4910-97c5-3d8de3227d30',
                redirectUri: window.location.href.split('#')[0]
            },
            cache: { cacheLocation: 'sessionStorage' }
        };

        const SCOPES = ['Sites.Read.All', 'Sites.ReadWrite.All', 'User.Read'];
        const SITE_REF = 'iesgregorioprieto.sharepoint.com:/sites/GestinDigitalIESGregorioPrieto';

        let msalInstance = new msal.PublicClientApplication(msalConfig);
        let siteId = null;
        let accessToken = null;

        // ── DATA ─────────────────────────────────────────────────────
        const data = {
            users: [],
            reports: [],
            dld: [],
            guardias: [],
            currentUser: null,
            selectedRole: null
        };

        // ── MICROSOFT GRAPH API ──────────────────────────────────────
        async function getToken() {
            const accounts = msalInstance.getAllAccounts();
            if (accounts.length === 0) {
                const resp = await msalInstance.loginPopup({ scopes: SCOPES });
                return resp.accessToken;
            }
            const resp = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
            return resp.accessToken;
        }

        async function graphGet(endpoint) {
            const token = await getToken();
            const resp = await fetch('https://graph.microsoft.com/v1.0' + endpoint, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if (!resp.ok) throw new Error(await resp.text());
            return await resp.json();
        }

        async function getListItems(listName) {
            if (!siteId) return [];
            const token = await getToken();
            const resp = await fetch(
                `https://graph.microsoft.com/v1.0/sites/${siteId}/lists?$filter=displayName eq '${listName}'`,
                { headers: { 'Authorization': 'Bearer ' + token } }
            );
            const data = await resp.json();
            if (!data.value || data.value.length === 0) return [];
            
            const listId = data.value[0].id;
            const itemsResp = await fetch(
                `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items?$expand=fields`,
                { headers: { 'Authorization': 'Bearer ' + token } }
            );
            const items = await itemsResp.json();
            return items.value || [];
        }

        // ── SINCRONIZAR DATOS ────────────────────────────────────────
        async function syncData() {
            try {
                const site = await graphGet('/sites/' + SITE_REF);
                siteId = site.id;
                data.users = await getListItems('USUARIOS');
                return true;
            } catch (e) {
                console.error('Error sincronizando:', e);
                return false;
            }
        }

        // ── LOGIN SIMPLE ─────────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.toLowerCase().trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loadingDiv = document.getElementById('loadingMessage');
            const btn = this.querySelector('button[type="submit"]');

            errorDiv.textContent = '';
            loadingDiv.style.display = 'block';
            btn.disabled = true;

            try {
                // Autenticar con MSAL en background (sin popup para usuario)
                accessToken = await getToken();
                
                // Sincronizar usuarios desde SharePoint
                if (!await syncData()) {
                    throw new Error('No se pudo conectar con SharePoint');
                }

                // Buscar usuario en USUARIOS list
                let usuario = null;
                for (const u of data.users) {
                    if (!u.fields) continue;
                    const uEmail = (u.fields.username || '').toLowerCase().trim();
                    if (uEmail === email) {
                        usuario = u;
                        break;
                    }
                }

                if (!usuario) {
                    throw new Error('Email no encontrado en el sistema');
                }

                // Validar contraseña (si está almacenada)
                if (usuario.fields.password && usuario.fields.password !== password) {
                    throw new Error('Contraseña incorrecta');
                }

                // Guardar usuario autenticado
                data.currentUser = {
                    email: email,
                    username: usuario.fields.displayName || email.split('@')[0],
                    role: usuario.fields.role || 'profesor',
                    especialidad: usuario.fields.especialidad || '',
                    nivel: usuario.fields.nivel || ''
                };

                // Obtener roles disponibles
                const rolesDisponibles = getRolesDisponibles(data.currentUser.role);

                if (rolesDisponibles.length > 1) {
                    // Mostrar selector de rol
                    mostrarSelectorRoles(rolesDisponibles);
                } else {
                    // Entrar directamente con su único rol
                    data.selectedRole = rolesDisponibles[0];
                    entrarAlApp();
                }

            } catch (error) {
                errorDiv.textContent = '❌ ' + error.message;
            } finally {
                loadingDiv.style.display = 'none';
                btn.disabled = false;
            }
        });

        // ── ROLES DISPONIBLES ────────────────────────────────────────
        function getRolesDisponibles(rolPrincipal) {
            const roles = [rolPrincipal];
            
            // Admin y Jefe pueden acceder como profesor también
            if ((rolPrincipal === 'admin' || rolPrincipal === 'jefe_estudios') && rolPrincipal !== 'profesor') {
                roles.push('profesor');
            }
            
            return roles;
        }

        function getRoleLabel(role) {
            const labels = {
                'profesor': '👨‍🏫 Profesor',
                'jefe_estudios': '📊 Jefe de Estudios',
                'admin': '🔐 Secretario/Admin'
            };
            return labels[role] || role;
        }

        function getRoleDescription(role) {
            const descriptions = {
                'profesor': 'Reportar incidencias y solicitar días libres',
                'jefe_estudios': 'Aprobar solicitudes y gestionar reportes',
                'admin': 'Control total de la plataforma'
            };
            return descriptions[role] || '';
        }

        // ── SELECTOR DE ROLES ────────────────────────────────────────
        function mostrarSelectorRoles(roles) {
            const modal = document.getElementById('roleModal');
            const rolesDiv = document.getElementById('roleOptions');
            
            rolesDiv.innerHTML = '';
            data.selectedRole = roles[0]; // Seleccionar primer rol por defecto

            roles.forEach((role, idx) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'role-btn' + (idx === 0 ? ' selected' : '');
                btn.innerHTML = `<span class="role-btn-icon">${role === 'profesor' ? '👨‍🏫' : role === 'jefe_estudios' ? '📊' : '🔐'}</span> ${getRoleLabel(role)}`;
                btn.onclick = function() {
                    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    data.selectedRole = role;
                };
                rolesDiv.appendChild(btn);
            });

            modal.classList.add('active');
        }

        document.getElementById('confirmRoleBtn').addEventListener('click', function() {
            document.getElementById('roleModal').classList.remove('active');
            entrarAlApp();
        });

        // ── ENTRAR A LA APP ──────────────────────────────────────────
        function entrarAlApp() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('appContainer').classList.add('active');
            
            document.getElementById('userDisplay').textContent = data.currentUser.username;
            document.getElementById('roleDisplay').innerHTML = `<div class="role-badge">${getRoleLabel(data.selectedRole)}</div>`;
            
            // Mostrar/ocultar módulos según rol
            if (data.selectedRole === 'admin' || data.selectedRole === 'jefe_estudios') {
                document.getElementById('adminBtn').style.display = 'block';
            } else {
                document.getElementById('adminBtn').style.display = 'none';
            }

            // Event listeners de módulos
            document.getElementById('mantenimientoBtn').addEventListener('click', function() {
                alert('Módulo Mantenimiento - En desarrollo');
            });

            document.getElementById('dldBtn').addEventListener('click', function() {
                alert('Módulo Días Libres - En desarrollo');
            });

            document.getElementById('guardiasBtn').addEventListener('click', function() {
                alert('Módulo Guardias - En desarrollo');
            });

            document.getElementById('adminBtn').addEventListener('click', function() {
                alert('Panel Admin - En desarrollo');
            });
        }

        // ── LOGOUT ───────────────────────────────────────────────────
        document.getElementById('logoutBtn').addEventListener('click', function() {
            data.currentUser = null;
            data.selectedRole = null;
            document.getElementById('appContainer').classList.remove('active');
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('errorMessage').textContent = '';
        });

        // ── INICIALIZACIÓN ───────────────────────────────────────────
        msalInstance.initialize();
    </script>
</body>
</html>
